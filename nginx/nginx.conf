worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid       /var/run/nginx.pid;

events {
  worker_connections 4096;
  use epoll;
  multi_accept on;
}

http {
  include      /etc/nginx/mime.types;
  default_type application/octet-stream;

  # ── Logging ────────────────────────────────────────────────────────────────
  log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                  '$status $body_bytes_sent "$http_referer" '
                  '"$http_user_agent" "$http_x_forwarded_for" '
                  'rt=$request_time';
  access_log /var/log/nginx/access.log main;

  # ── Performance ────────────────────────────────────────────────────────────
  sendfile           on;
  tcp_nopush         on;
  tcp_nodelay        on;
  keepalive_timeout  75s;
  gzip               on;
  gzip_min_length    1024;
  gzip_types         text/plain application/json application/octet-stream;

  # ── Security headers ───────────────────────────────────────────────────────
  server_tokens      off;
  add_header X-Frame-Options          DENY         always;
  add_header X-Content-Type-Options   nosniff      always;
  add_header X-XSS-Protection         "1; mode=block" always;
  add_header Referrer-Policy          "no-referrer" always;
  add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

  # ── Rate limiting zones ────────────────────────────────────────────────────
  limit_req_zone $binary_remote_addr zone=global:10m rate=100r/m;
  limit_req_zone $binary_remote_addr zone=auth:10m   rate=20r/m;
  limit_req_status 429;

  # ── Client body limits ─────────────────────────────────────────────────────
  client_max_body_size 512m;      # large git pack files
  client_body_timeout  120s;
  send_timeout         120s;

  # ── Upstream API ───────────────────────────────────────────────────────────
  upstream api {
    server api:3000;
    keepalive 32;
  }

  server {
    listen 80;
    server_name _;

    # ── Auth endpoints — stricter rate limit ──────────────────────────────
    location ~ ^/auth/ {
      limit_req zone=auth burst=10 nodelay;
      proxy_pass         http://api;
      proxy_http_version 1.1;
      proxy_set_header   Connection      "";
      proxy_set_header   Host            $host;
      proxy_set_header   X-Real-IP       $remote_addr;
      proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_read_timeout 30s;
    }

    # ── Git smart-HTTP — no body buffering (streaming pack data) ──────────
    location ~ \.git/ {
      limit_req zone=global burst=20 nodelay;
      proxy_pass            http://api;
      proxy_http_version    1.1;
      proxy_set_header      Connection      "";
      proxy_set_header      Host            $host;
      proxy_set_header      X-Real-IP       $remote_addr;
      proxy_set_header      X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_request_buffering off;
      proxy_buffering         off;
      proxy_read_timeout      600s;
      proxy_send_timeout      600s;
    }

    # ── All other API traffic ─────────────────────────────────────────────
    location / {
      limit_req zone=global burst=50 nodelay;
      proxy_pass         http://api;
      proxy_http_version 1.1;
      proxy_set_header   Connection      "";
      proxy_set_header   Host            $host;
      proxy_set_header   X-Real-IP       $remote_addr;
      proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_read_timeout 60s;
    }

    # ── Health check (Nginx-level, no auth) ──────────────────────────────
    location = /nginx-health {
      access_log off;
      return 200 "ok\n";
      add_header Content-Type text/plain;
    }
  }
}
